name: Cleanup Azure Resources

on:
  workflow_dispatch

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete Resource Group
        run: az group delete --name lesson6-rg --yes --no-wait
